<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moveset Index</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');

    :root {
      --bg: #050505;
      --panel: #101010;
      --panel-2: #171717;
      --text: #f5f5f5;
      --muted: #b9b9b9;
      --border: #737373;
      --border-soft: #303030;
      --font-display: "Press Start 2P", "VT323", "Courier New", monospace;
      --font-body: "VT323", "Lucida Console", "Courier New", monospace;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
    }

    body {
      padding: 30px;
      font-size: 1.45rem;
      line-height: 1.35;
      letter-spacing: 0.015em;
    }

    .shell {
      max-width: 1475px;
      margin: 0 auto;
      padding: 28px;
      background: #080808;
      border: 1px solid var(--border);
    }

    .intro,
    .character-card,
    .empty-state {
      background: var(--panel);
      border: 1px solid var(--border);
    }

    .intro {
      margin-bottom: 20px;
      padding: 25px;
    }

    h1,
    h2 {
      margin: 0;
      color: var(--text);
      font-family: var(--font-display);
      font-weight: 400;
      line-height: 1.45;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    h1 {
      font-size: clamp(1.4rem, 3vw, 2.3rem);
    }

    h2 {
      font-size: 1rem;
    }

    .intro p,
    .card-copy p,
    .meta-chip,
    .empty-state {
      color: var(--muted);
    }

    .intro p {
      max-width: 900px;
      margin: 18px 0 0;
      font-size: 1.6rem;
    }

    .character-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 18px;
    }

    .character-card {
      display: grid;
      min-height: 330px;
      overflow: hidden;
      color: inherit;
      text-decoration: none;
    }

    .character-card:hover,
    .character-card:focus-visible {
      border-color: var(--text);
      outline: 0;
    }

    .banner {
      min-height: 190px;
      background: var(--panel-2);
      border-bottom: 1px solid var(--border);
    }

    .banner img {
      display: block;
      width: 100%;
      height: 100%;
      min-height: 190px;
      object-fit: cover;
      object-position: center;
      filter: grayscale(1);
      image-rendering: pixelated;
    }

    .card-copy {
      padding: 18px 20px 20px;
    }

    .card-copy p {
      margin: 10px 0 0;
      font-size: 1.45rem;
    }

    .meta-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .meta-chip {
      padding: 8px 10px;
      border: 1px solid var(--border-soft);
      background: #0b0b0b;
      font-size: 1.25rem;
      line-height: 1.2;
    }

    .empty-state {
      padding: 20px;
      font-size: 1.5rem;
    }

    @media (max-width: 700px) {
      body {
        padding: 15px;
      }

      .shell {
        padding: 18px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="intro">
      <h1>Moveset Index</h1>
      <p>Hi. This is the quick home page for hosted character movesets. The look will get standardized later; for now, pick a character below to open their page.</p>
    </section>

    <section class="character-grid" id="character-grid" aria-label="Characters">
      <div class="empty-state">Loading movesets...</div>
    </section>
  </main>

  <script>
    const repoApi = "https://api.github.com/repos/Margeshy/su-fighters/contents";
    const grid = document.getElementById("character-grid");

    function textFrom(root, selector) {
      const element = root.querySelector(selector);
      return element ? element.textContent.replace(/\s+/g, " ").trim() : "";
    }

    function absoluteAssetUrl(pagePath, assetPath) {
      return new URL(assetPath, new URL(pagePath, window.location.href)).href;
    }

    function metaValue(documentRoot, label) {
      const chips = Array.from(documentRoot.querySelectorAll(".meta-chip"));
      const chip = chips.find((item) => item.textContent.trim().toLowerCase().startsWith(label.toLowerCase()));
      if (!chip) {
        return "";
      }

      const value = chip.querySelector(".chip-value");
      return (value || chip).textContent.replace(/\s+/g, " ").trim().replace(new RegExp(`^${label}\\s*`, "i"), "");
    }

    function renderCard(character) {
      const card = document.createElement("a");
      card.className = "character-card";
      card.href = character.path;
      card.innerHTML = `
        <div class="banner">
          <img src="${character.image}" alt="${character.name} banner">
        </div>
        <div class="card-copy">
          <h2>${character.name}</h2>
          <p>${character.subtitle || "Moveset page"}</p>
          <div class="meta-list">
            <span class="meta-chip">Cost: ${character.cost || "TBD"}</span>
            <span class="meta-chip">Archetype: ${character.archetype || "TBD"}</span>
            <span class="meta-chip">Difficulty: ${character.difficulty || "TBD"}</span>
          </div>
        </div>
      `;
      return card;
    }

    async function readCharacterPage(file) {
      const response = await fetch(file.path, { cache: "no-store" });
      const html = await response.text();
      const doc = new DOMParser().parseFromString(html, "text/html");
      const heroImage = doc.querySelector(".hero img");
      const subtitle = textFrom(doc, ".character-subtitle").replace(/^"|"$/g, "");

      return {
        path: file.path,
        name: textFrom(doc, ".character-name") || file.name.replace(/\.html$/i, ""),
        subtitle,
        image: heroImage ? absoluteAssetUrl(file.path, heroImage.getAttribute("src")) : "",
        cost: metaValue(doc, "Cost:"),
        archetype: metaValue(doc, "Archetype:"),
        difficulty: metaValue(doc, "Difficulty:"),
      };
    }

    async function loadCharacters() {
      try {
        const response = await fetch(repoApi, { cache: "no-store" });
        const files = await response.json();
        const pages = files
          .filter((file) => file.type === "file")
          .filter((file) => file.name.endsWith(".html"))
          .filter((file) => file.name !== "index.html")
          .map((file) => ({ name: file.name, path: file.name }))
          .sort((a, b) => a.name.localeCompare(b.name));

        const characters = await Promise.all(pages.map(readCharacterPage));
        grid.replaceChildren(...characters.map(renderCard));

        if (characters.length === 0) {
          grid.replaceChildren(Object.assign(document.createElement("div"), {
            className: "empty-state",
            textContent: "No movesets have been published yet.",
          }));
        }
      } catch (error) {
        grid.replaceChildren(Object.assign(document.createElement("div"), {
          className: "empty-state",
          textContent: "Could not load the moveset index.",
        }));
      }
    }

    loadCharacters();
  </script>
</body>
</html>
