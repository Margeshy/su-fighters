<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moveset Index</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');

    :root {
      --bg: #07080b;
      --panel: #14161b;
      --panel-2: #1a1e26;
      --text: #f2f4f7;
      --muted: #b9c0cb;
      --border: #4a5d86;
      --accent: #8aa8f2;
      --shadow: rgba(0, 0, 0, 0.3);
      --font-display: "Press Start 2P", "VT323", "Courier New", monospace;
      --font-body: "VT323", "Lucida Console", "Courier New", monospace;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
    }

    body {
      padding: 30px;
      font-size: 1.45rem;
      line-height: 1.35;
      letter-spacing: 0.015em;
    }

    .shell {
      max-width: 1475px;
      margin: 0 auto;
      padding: 28px;
      background: #0a0b0e;
      border: 1px solid var(--border);
      box-shadow: 0 10px 26px var(--shadow);
    }

    .intro {
      margin-bottom: 20px;
      padding: 25px;
      background: var(--panel);
      border: 1px solid var(--border);
    }

    h1,
    h2 {
      margin: 0;
      color: var(--accent);
      font-family: var(--font-display);
      font-weight: 400;
      line-height: 1.45;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    h1 {
      font-size: clamp(1.4rem, 3vw, 2.3rem);
    }

    h2 {
      font-size: 1rem;
    }

    .intro p {
      max-width: 900px;
      margin: 18px 0 0;
      color: var(--muted);
      font-size: 1.6rem;
    }

    .character-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 18px;
    }

    .character-card {
      display: grid;
      min-height: 260px;
      overflow: hidden;
      color: inherit;
      text-decoration: none;
      background: var(--panel);
      border: 1px solid var(--border);
    }

    .character-card:hover,
    .character-card:focus-visible {
      border-color: var(--accent);
      outline: 0;
    }

    .banner {
      min-height: 190px;
      background: var(--panel-2);
      border-bottom: 1px solid var(--border);
    }

    .banner img {
      display: block;
      width: 100%;
      height: 100%;
      min-height: 190px;
      object-fit: cover;
      object-position: center;
      image-rendering: pixelated;
    }

    .card-copy {
      padding: 18px 20px 20px;
    }

    .card-copy p {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 1.45rem;
    }

    @media (max-width: 700px) {
      body {
        padding: 15px;
      }

      .shell {
        padding: 18px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="intro">
      <h1>Moveset Index</h1>
      <p>Hi. This is the quick home page for hosted character movesets. The look will get standardized later; for now, pick a character below to open their page.</p>
    </section>

    <section class="character-grid" aria-label="Characters">
      <a class="character-card" href="ay-third-raikage.html">
        <div class="banner">
          <img src="data/chars/Ay%20Third%20Raikage/ay.webp" alt="Ay [Third Raikage] banner">
        </div>
        <div class="card-copy">
          <h2>Ay [Third Raikage]</h2>
          <p>Base-only rushdown and snowball moveset.</p>
        </div>
      </a>
    </section>
  </main>
</body>
</html>
